name: FDD CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (compile + unit tests)
        run: ./gradlew build --no-daemon
        env:
          # Dummy keys so Spring context loads; unit tests mock the LLM layer.
          # Using a value that does NOT match the sk-[a-zA-Z0-9]{48} secret-scanning pattern.
          # integrationTest is auto-skipped unless explicitly called.
          OPENAI_API_KEY: dummy-openai-key-for-ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 14

      - name: Generate coverage report
        run: ./gradlew koverHtmlReport --no-daemon
        env:
          OPENAI_API_KEY: dummy-openai-key-for-ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/kover/html/
          retention-days: 14

