# ---- Experiment Profile ----
# Activated with: --spring.profiles.active=experiment
# For running drift detection experiments in a controlled environment.

spring:
  application:
    name: fdd-experiment

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration

fdd:
  ai:
    provider: openrouter
    temperature: 0.1

    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
      base-url: https://api.openai.com

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-20250514

    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-2.5-flash
      base-url: https://generativelanguage.googleapis.com/v1beta/openai

    mistral:
      api-key: ${MISTRAL_API_KEY:}
      model: mistral-large-latest
      base-url: https://api.mistral.ai

    groq:
      api-key: ${GROQ_API_KEY:}
      model: llama-3.3-70b-versatile
      base-url: https://api.groq.com/openai

    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      model: google/gemini-2.5-flash
      base-url: https://openrouter.ai/api

  validation:
    max-attempts: 5

  cache:
    enabled: true
    ttl-minutes: 60
    directory: .fdd-cache

# ---- Logging  ----
logging:
  level:
    com.example.fdd: DEBUG
    com.example.fdd.ai: DEBUG
    com.example.fdd.service: DEBUG
    com.example.fdd.validation: DEBUG
    ca.uhn.fhir: WARN
    org.springframework.ai: DEBUG
